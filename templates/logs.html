<h2>Activity Logs</h2>
<table border="1">
    <tr><th>Time</th><th>Action</th><th>Details</th><th>Confidence</th></tr>
    {% for log in logs %}
    <tr>
        <td>{{ log['timestamp'] }}</td>
        <td>{{ log['action'] }}</td>
        <td>{{ log['details'] }}</td>
        <td>{{ log['confidence']|round(2) }}%</td>
    </tr>
    {% endfor %}
</table>
